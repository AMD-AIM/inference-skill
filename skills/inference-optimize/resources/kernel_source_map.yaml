# Kernel source map keyed by runtime symbol pattern.
#
# Each entry maps a rocprofv3-observed kernel symbol (or glob pattern) to the
# upstream source file that the optimization pipeline must fork and rebuild.
# Phase 6 (`upstream-resolve`) consumes this file; the resolver matches the
# baseline-dispatch-trace symbol against `symbol_pattern` and returns the
# library, source form, GEAK strategy, and per-kernel test/rebuild commands.
#
# Templated tokens substituted by Phase 7 before being passed to GEAK:
#   {library_test_path}  -> the entry's `library_test_path` field
#
# `geak_strategy` values (see redesign plan, Axis 1 x Axis 2 -> strategy):
#   in_place_optimize
#   in_place_optimize_no_harness   (Bucket B, requires user opt-in)
#   dispatch_redirect_to_triton
#   dispatch_redirect_to_open_lib
#   unfeasible_record_only
#
# `bucket` values: A | B | C
# `gating_reason` values (Bucket B only): no_test_harness | rebuild_too_expensive
#
# `cost_profile` lets Phase 6 quote the per-attempt and per-rebuild minutes when
# raising the Bucket B AskUserQuestion.

entries:

  # -----------------------------------------------------------------------
  # FLA -- pure Python Triton kernels
  # -----------------------------------------------------------------------
  - symbol_pattern: "fused_recurrent_gated_delta_rule_fwd_kernel*"
    library: fla
    source_form: triton
    bucket: A
    geak_strategy: in_place_optimize
    upstream_repo: "sustcsonglin/flash-linear-attention"
    source_file: "fla/ops/gated_delta_rule/fused_recurrent.py"
    library_test_path: "tests/ops/test_fused_recurrent.py"
    library_test_command: "pytest -x -q {library_test_path}"
    rebuild_command: "pip install -e ."
    expected_dispatch_symbols: ["fused_recurrent_gated_delta_rule_fwd_kernel*"]
    vendor_baseline_symbols: []
    geak_feasibility: easy
    cost_profile:
      per_attempt_minutes: 1
      rebuild_minutes: 1
    geak_task_hint: |
      Optimize the Triton kernel `fused_recurrent_gated_delta_rule_fwd_kernel`
      in this file. Do not modify the Python wrapper, the autograd Function,
      or the test file. Metric: median latency in microseconds reported by
      the test harness (lower is better). Roofline: <ROOFLINE_DATA>.
    redirect_target: null

